<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고용노동부 문서분류기</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>고용노동부 문서분류기</h1>
      <p class="desc">텍스트 입력만으로 담당부서와 주요 내용을 분류합니다.</p>

      <section class="panel">
        <h2>입력</h2>
        <form id="classifyForm">
          <label class="field">
            <span>텍스트 입력</span>
            <textarea id="textInput" name="text" rows="8" placeholder="민원/문의/QnA 내용을 입력하세요."></textarea>
          </label>

          <div class="row">
            <label>
              유사문서 수
              <input type="number" name="topk" value="5" min="1" max="10" />
            </label>
            <label>
              키워드 수
              <input type="number" name="topics" value="6" min="3" max="12" />
            </label>
          </div>

          <button type="submit" id="submitBtn">분류 실행</button>
        </form>
      </section>

      <section class="panel">
        <h2>결과</h2>
        <pre id="resultBox">아직 결과가 없습니다.</pre>
      </section>

      <section class="panel">
        <h2>메타 정보</h2>
        <pre id="metaBox">로딩 중...</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
